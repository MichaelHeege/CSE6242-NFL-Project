<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Football Field</title>
    <script src="https://d3js.org/d3.v5.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }

        #controls {
            margin-bottom: 20px;
            padding: 12px;
            background-color: white;
            border: 1px solid #ccc;
            width: fit-content;
        }

        #controls label {
            margin-right: 8px;
            font-weight: bold;
        }

        #controls input,
        #controls select {
            margin-right: 20px;
            padding: 4px;
        }

        #chart-area {
            margin-top: 10px;
        }

        .field-outline {
            fill: #2e8b57;
            stroke: #222;
            stroke-width: 3px;
        }

        .endzone {
            fill: #1f6b35;
            stroke: none;
        }

        .yard-line {
            stroke: white;
            stroke-width: 1;
            opacity: 0.7;
        }

        .hash-mark {
            stroke: white;
            stroke-width: 1;
            opacity: 0.7;
        }

        .yard-number {
            fill: white;
            font-size: 16px;
            font-weight: bold;
            text-anchor: middle;
            dominant-baseline: middle;
            opacity: 0.9;
        }

        .scrimmage-line {
            stroke: blue;
            stroke-width: 4px;
            cursor: ew-resize;
        }

        .first-down-line {
            stroke: gold;
            stroke-width: 4px;
            cursor: ew-resize;
        }

        .line-label {
            font-size: 14px;
            font-weight: bold;
            text-anchor: middle;
        }

        .info-text {
            font-size: 18px;
            font-weight: bold;
            margin-top: 12px;
        }

        .help-icon {
            display: inline-block;
            width: 10px;
            height: 10px;
            line-height: 10px;
            text-align: center;
            border: 1px solid black;
            border-radius: 50%;
            font-size: 7px;
            font-weight: bold;
            color: black;
            cursor: default;
            position: relative;
            margin-left: 2px;
        }

        .tooltip-box {
            display: none;
            position: absolute;
            top: 24px;
            left: 0;
            width: 220px;
            padding: 8px;
            background-color: white;
            border: 1px solid black;
            font-size: 12px;
            font-weight: normal;
            text-align: left;
            z-index: 1000;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
        }

        .help-icon:hover .tooltip-box {
            display: block;
        }

    </style>
</head>
<body>

    <h2>Football Field with User Input</h2>

    <div id="controls">
        <label for="gameClock">
            Game Clock
            <span class="help-icon">?
                <span class="tooltip-box">[description]</span>
            </span>
        </label>
        <input type="text" id="gameClock" name="game_clock" value="15:00" maxlength="5">

        <label for="quarterNumber">
            Quarter
            <span class="help-icon">?
                <span class="tooltip-box">[description]</span>
            </span>
        </label>
        <select id="quarterNumber" name="quarter">
            <option value="1st">1st</option>
            <option value="2nd">2nd</option>
            <option value="3rd">3rd</option>
            <option value="4th">4th</option>
        </select>

        <label for="downNumber">
            Down
            <span class="help-icon">?
                <span class="tooltip-box">[description]</span>
            </span>
        </label>
        <select id="downNumber" name="down">
            <option value="1">1st</option>
            <option value="2">2nd</option>
            <option value="3">3rd</option>
            <option value="4">4th</option>
        </select>

        <label for="playType">
            Play Type
            <span class="help-icon">?
                <span class="tooltip-box">[description]</span>
            </span>
        </label>
        <select id="playType" name="play_type">
            <option value="run">Run</option>
            <option value="pass">Pass</option>
        </select>
        <button id="runModel" type="button">Run Model</button>
        <span id="runStatus"></span>
    </div>

    <div id="chart-area"></div>
    <div id="info" class="info-text"></div>

    <script>
        // Everything below runs in the browser. Most of it controls the field UI.
        // The main Flask integration points are:
        // 1. reading/writing URL query params
        // 2. building the payload for the backend
        // 3. POSTing that payload to /api/predict
        var margin = {top: 20, right: 20, bottom: 20, left: 20};
        var initialParams = new URLSearchParams(window.location.search);

        var outerWidth = 1200;
        var outerHeight = 500;

        var width = outerWidth - margin.left - margin.right;
        var height = outerHeight - margin.top - margin.bottom;

        var totalYards = 120;

        var svg = d3.select("#chart-area")
            .append("svg")
            .attr("width", outerWidth)
            .attr("height", outerHeight);

        var g = svg.append("g")
            .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

        var xScale = d3.scaleLinear()
            .domain([0, totalYards])
            .range([0, width]);

        g.append("rect")
            .attr("class", "field-outline")
            .attr("x", 0)
            .attr("y", 0)
            .attr("width", width)
            .attr("height", height);

        g.append("rect")
            .attr("class", "endzone")
            .attr("x", xScale(0))
            .attr("y", 0)
            .attr("width", xScale(10) - xScale(0))
            .attr("height", height);

        g.append("rect")
            .attr("class", "endzone")
            .attr("x", xScale(110))
            .attr("y", 0)
            .attr("width", xScale(120) - xScale(110))
            .attr("height", height);

        for (var yard = 10; yard <= 110; yard += 5) {
            g.append("line")
                .attr("class", "yard-line")
                .attr("x1", xScale(yard))
                .attr("x2", xScale(yard))
                .attr("y1", 0)
                .attr("y2", height);
        }

        for (var yard1 = 11; yard1 < 110; yard1 += 1) {
            g.append("line")
                .attr("class", "hash-mark")
                .attr("x1", xScale(yard1))
                .attr("x2", xScale(yard1))
                .attr("y1", height * 0.38)
                .attr("y2", height * 0.40);
        }

        for (var yard2 = 11; yard2 < 110; yard2 += 1) {
            g.append("line")
                .attr("class", "hash-mark")
                .attr("x1", xScale(yard2))
                .attr("x2", xScale(yard2))
                .attr("y1", height * 0.60)
                .attr("y2", height * 0.62);
        }

        var yardLabels = [
            {yard: 20, label: "10"},
            {yard: 30, label: "20"},
            {yard: 40, label: "30"},
            {yard: 50, label: "40"},
            {yard: 60, label: "50"},
            {yard: 70, label: "40"},
            {yard: 80, label: "30"},
            {yard: 90, label: "20"},
            {yard: 100, label: "10"}
        ];

        g.selectAll(".top-yard-number")
            .data(yardLabels)
            .enter()
            .append("text")
            .attr("class", "yard-number")
            .attr("x", function(d) { return xScale(d.yard); })
            .attr("y", height * 0.25)
            .text(function(d) { return d.label; });

        g.selectAll(".bottom-yard-number")
            .data(yardLabels)
            .enter()
            .append("text")
            .attr("class", "yard-number")
            .attr("x", function(d) { return xScale(d.yard); })
            .attr("y", height * 0.75)
            .attr("transform", function(d) {
                return "rotate(180," + xScale(d.yard) + "," + (height * 0.75) + ")";
            })
            .text(function(d) { return d.label; });

        var lineOfScrimmageYard = 35;
        var firstDownYard = 45;

        var scrimmageLine = g.append("line")
            .attr("class", "scrimmage-line")
            .attr("x1", xScale(lineOfScrimmageYard))
            .attr("x2", xScale(lineOfScrimmageYard))
            .attr("y1", 0)
            .attr("y2", height);

        var firstDownLine = g.append("line")
            .attr("class", "first-down-line")
            .attr("x1", xScale(firstDownYard))
            .attr("x2", xScale(firstDownYard))
            .attr("y1", 0)
            .attr("y2", height);

        var scrimmageLabel = g.append("text")
            .attr("class", "line-label")
            .attr("x", xScale(lineOfScrimmageYard))
            .attr("y", -5)
            .attr("fill", "blue")
            .text("LOS");

        var firstDownLabel = g.append("text")
            .attr("class", "line-label")
            .attr("x", xScale(firstDownYard))
            .attr("y", -5)
            .attr("fill", "goldenrod")
            .text("1st Down");

        function cleanGameClock(clockValue) {
            var parts;
            var minutes;
            var seconds;
            var totalSeconds;

            parts = clockValue.split(":");

            if (parts.length !== 2) {
                return "15:00";
            }

            minutes = Number(parts[0]);
            seconds = Number(parts[1]);

            if (isNaN(minutes) || isNaN(seconds)) {
                return "15:00";
            }

            if (minutes < 0 || minutes > 15) {
                return "15:00";
            }

            if (seconds < 0 || seconds > 59) {
                return "15:00";
            }

            totalSeconds = minutes * 60 + seconds;

            if (totalSeconds < 0 || totalSeconds > 900) {
                return "15:00";
            }

            if (minutes === 15 && seconds > 0) {
                return "15:00";
            }

            return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
        }

        function applyInitialSelections() {
            // Read existing query-string values from the URL and use them to
            // prefill the controls when the page first loads.
            var gameClock = initialParams.get("game_clock");
            var quarter = initialParams.get("quarter");
            var down = initialParams.get("down");
            var playType = initialParams.get("play_type");

            if (gameClock) {
                document.getElementById("gameClock").value = gameClock;
            }
            if (quarter) {
                document.getElementById("quarterNumber").value = quarter;
            }
            if (down) {
                document.getElementById("downNumber").value = down;
            }
            if (playType === "run" || playType === "pass") {
                document.getElementById("playType").value = playType;
            }
        }

        function syncUrl() {
            // Keep the URL in sync with the current UI state.
            // This does not call Flask by itself; it only updates the browser URL.
            var params = new URLSearchParams(window.location.search);
            params.set("game_clock", document.getElementById("gameClock").value);
            params.set("quarter", document.getElementById("quarterNumber").value);
            params.set("down", document.getElementById("downNumber").value);
            params.set("play_type", document.getElementById("playType").value);
            window.history.replaceState({}, "", window.location.pathname + "?" + params.toString());
        }

        function getDisplayYard(rawYard) {
            if (rawYard <= 60) {
                return rawYard - 10;
            } else {
                return 110 - rawYard;
            }
        }

        function updateLines() {
            var yardsToGo;
            var yardsToTouchdown;
            var gameClockInput;
            var gameClockValue;
            var quarterValue;
            var downValue;
            var playTypeValue;

            lineOfScrimmageYard = Math.round(lineOfScrimmageYard);
            firstDownYard = Math.round(firstDownYard);

            if (lineOfScrimmageYard < 10) {
                lineOfScrimmageYard = 10;
            }
            if (lineOfScrimmageYard > 110) {
                lineOfScrimmageYard = 110;
            }

            if (firstDownYard < 10) {
                firstDownYard = 10;
            }
            if (firstDownYard > 110) {
                firstDownYard = 110;
            }

            scrimmageLine
                .attr("x1", xScale(lineOfScrimmageYard))
                .attr("x2", xScale(lineOfScrimmageYard));

            firstDownLine
                .attr("x1", xScale(firstDownYard))
                .attr("x2", xScale(firstDownYard));

            scrimmageLabel
                .attr("x", xScale(lineOfScrimmageYard));

            firstDownLabel
                .attr("x", xScale(firstDownYard));

            yardsToGo = firstDownYard - lineOfScrimmageYard;
            yardsToTouchdown = 110 - lineOfScrimmageYard;

            var displayLOS = getDisplayYard(lineOfScrimmageYard);
            var displayFirstDown = getDisplayYard(firstDownYard);

            gameClockInput = document.getElementById("gameClock");
            gameClockValue = cleanGameClock(gameClockInput.value);
            gameClockInput.value = gameClockValue;

            quarterValue = document.getElementById("quarterNumber").value;

            downValue = document.getElementById("downNumber").value;

            playTypeValue = document.getElementById("playType").value;
            var playTypeLabel = playTypeValue.charAt(0).toUpperCase() + playTypeValue.slice(1);

            d3.select("#info")
                .html(
                    "Game Clock: " + gameClockValue +
                    "<span class='help-icon'>?" +
                        "<span class='tooltip-box'>[description]</span>" +
                    "</span>" +
                    " | Quarter: " + quarterValue +
                    "<span class='help-icon'>?" +
                        "<span class='tooltip-box'>[description]</span>" +
                    "</span>" +
                    " | Down: " + downValue +
                    "<span class='help-icon'>?" +
                        "<span class='tooltip-box'>[description]</span>" +
                    "</span>" +
                    " | Play Type: " + playTypeLabel +
                    "<span class='help-icon'>?" +
                        "<span class='tooltip-box'>[description]</span>" +
                    "</span>" +
                    " | LOS: " + displayLOS +
                    "<span class='help-icon'>?" +
                        "<span class='tooltip-box'>[description]</span>" +
                    "</span>" +
                    " | First Down: " + displayFirstDown +
                    "<span class='help-icon'>?" +
                        "<span class='tooltip-box'>[description]</span>" +
                    "</span>" +
                    " | Yards to Go (1st Down): " + yardsToGo +
                    "<span class='help-icon'>?" +
                        "<span class='tooltip-box'>[description]</span>" +
                    "</span>" +
                    " | Yards to Go (Touchdown): " + yardsToTouchdown +
                    "<span class='help-icon'>?" +
                        "<span class='tooltip-box'>[description]</span>" +
                    "</span>"
                );

            syncUrl();
        }

        var scrimmageDrag = d3.drag()
            .on("drag", function() {
                var mouseX = d3.mouse(g.node())[0];
                var newYard = xScale.invert(mouseX);

                if (newYard < 10) {
                    newYard = 10;
                }
                if (newYard > 110) {
                    newYard = 110;
                }

                lineOfScrimmageYard = Math.round(newYard);
                updateLines();
            });

        var firstDownDrag = d3.drag()
            .on("drag", function() {
                var mouseX = d3.mouse(g.node())[0];
                var newYard = xScale.invert(mouseX);

                if (newYard < 10) {
                    newYard = 10;
                }
                if (newYard > 110) {
                    newYard = 110;
                }

                firstDownYard = Math.round(newYard);
                updateLines();
            });

        scrimmageLine.call(scrimmageDrag);
        firstDownLine.call(firstDownDrag);

        scrimmageLabel.call(scrimmageDrag);
        firstDownLabel.call(firstDownDrag);

        d3.select("#gameClock").on("blur", function() {updateLines();});
        d3.select("#gameClock").on("change", function() {updateLines();});
        d3.select("#quarterNumber").on("change", function() {updateLines();});
        d3.select("#downNumber").on("change", function() {updateLines();});
        d3.select("#playType").on("change", function() {updateLines();});

        applyInitialSelections();
        updateLines();

        // This function maps browser UI values into the exact JSON keys
        // Flask expects in backend/play_handler.py.
        function collectPayload() {
            var goalToGoChecked = (110 - lineOfScrimmageYard) <= 10 ? 1 : 0;
            var formationValue = "shotgun";
            var playTypeValue = document.getElementById('playType').value;

            return {
                // play_type is used by Flask routes.py to choose the correct model.
                play_type: playTypeValue,
                game_clock: document.getElementById('gameClock').value,
                quarter: document.getElementById('quarterNumber').value,
                down: document.getElementById('downNumber').value,
                // LOS and ydstogo are derived from the draggable field lines.
                LOS: getDisplayYard(lineOfScrimmageYard),
                goal_to_go: goalToGoChecked,
                ydstogo: Math.max(0, Math.round(firstDownYard - lineOfScrimmageYard)),
                // These are backend model inputs. Right now some are fixed defaults.
                qb_dropback: 0,
                shotgun: formationValue === 'shotgun' ? 1 : 0,
                formation: formationValue,
                run_location: playTypeValue === 'run' ? 'middle' : null,
                run_gap: playTypeValue === 'run' ? 'guard' : null,
                // Timestamp is optional metadata for debugging requests.
                _ts: Date.now()
            };
        }

        document.getElementById('runModel').addEventListener('click', async function() {
            // This click handler is the main "talk to Flask" section.
            // When the button is clicked:
            // 1. build the payload from the UI
            // 2. send it to Flask with fetch()
            // 3. read the JSON response from Flask
            // 4. use that response in JavaScript
            const btn = this;
            const status = document.getElementById('runStatus');
            const payload = collectPayload();

            btn.disabled = true;
            status.textContent = 'Running...';

            try {
                // POST the UI data to the Flask route defined in routes.py:
                // @app.route('/api/predict', methods=['POST'])
                const resp = await fetch('/api/predict', {
                    method: 'POST',
                    // Tell Flask we are sending JSON in the request body.
                    headers: { 'Content-Type': 'application/json' },
                    // Convert the JavaScript object into a JSON string for Flask.
                    body: JSON.stringify(payload)
                });
                if (!resp.ok) throw new Error(resp.status + ' ' + resp.statusText);

                // Convert Flask's JSON response back into a JavaScript object.
                const j = await resp.json();

                // This is where a teammate would plug in visualization logic
                // if they want to draw model output on the page.
                console.log('model result', j);
                status.textContent = 'Done';
            } catch (err) {
                console.error(err);
                status.textContent = 'Error: ' + err.message;
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
